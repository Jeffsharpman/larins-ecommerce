<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Larins • 404 - Page Not Found</title>
    <link rel="stylesheet" href="css/output.css" />

    <!-- Optional: Lucide icons (for home arrow or other icons) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>

    <div data-include="components/header.html"></div>
    <div class="min-h-screen flex items-center justify-center px-4 py-24 text-center">
        <div class="max-w-lg">
            <h1 class="text-8xl md:text-[12rem] font-extrabold leading-none tracking-tight bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent mb-4">404</h1>
            <div class="mb-8">
                <p class="text-3xl md:text-4xl font-bold mb-3">Oops!</p>
                <p class="text-xl md:text-2xl text-muted-foreground leading-relaxed">The page you're looking for doesn't exist or has been moved.</p>
            </div>

            <a href="index.html" class="inline-flex items-center gap-2 px-7 py-3 bg-primary text-primary-foreground font-medium rounded-lg hover:bg-gold-dark transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg">
                <i data-lucide="arrow-left"></i>
                Return to Home
            </a>

            <!-- Optional fun visual / branding touch -->
            <div class="mt-12 text-muted-foreground italic">
                <p>Maybe you're looking for some luxurious hair care instead? ✨</p>
                <div class="mt-10">
                    <p class="mb-4">Or try searching for what you need:</p>
                    <form class="max-w-sm mx-auto">
                        <input type="search" placeholder="Search products..."
                            class="w-full px-4 py-3 rounded-lg border border-border bg-card focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" />
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div data-include="components/footer.html"></div>
    <script src="js/includes.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/header-auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
