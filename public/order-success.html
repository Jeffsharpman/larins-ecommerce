<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Larins • Order Success</title>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div data-include="components/header.html"></div>
    <main id="main-content" class="max-w-7xl mx-auto px-4 py-16" tabindex="-1">
        <!-- Success Hero Section -->
        <div class="text-center mb-16">
            <div class="relative mb-8">
                <!-- Decorative background elements -->
                <div class="absolute inset-0 -z-10">
                    <div class="w-32 h-32 bg-primary/10 rounded-full blur-3xl mx-auto"></div>
                </div>
                <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                    <i data-lucide="check-circle" class="w-12 h-12 text-green-600"></i>
                </div>
                <!-- Confetti icons for celebration -->
                <div class="absolute -top-4 -left-8 text-yellow-400">
                    <i data-lucide="star" class="w-6 h-6"></i>
                </div>
                <div class="absolute -top-2 -right-6 text-blue-400">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </div>
                <div class="absolute top-8 -left-12 text-pink-400">
                    <i data-lucide="heart" class="w-4 h-4"></i>
                </div>
                <div class="absolute top-6 -right-10 text-purple-400">
                    <i data-lucide="gift" class="w-5 h-5"></i>
                </div>
            </div>
            <h1 class="text-5xl font-bold text-foreground mb-4 bg-gradient-to-r from-primary to-primary/80 bg-clip-text text-transparent">Order Confirmed!</h1>
            <p class="text-xl text-muted-foreground max-w-2xl mx-auto mb-6">Thank you for choosing Larins! Your order has been successfully placed and is being prepared with care.</p>
            <div class="flex justify-center items-center gap-6 text-sm text-muted-foreground">
                <div class="flex items-center gap-2">
                    <i data-lucide="mail" class="w-4 h-4"></i>
                    <span>Confirmation email sent</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    <span>Processing within 24hrs</span>
                </div>
            </div>
        </div>

        <!-- Order Details Card -->
        <div id="orderDetailsContainer" class="bg-gradient-to-br from-card to-card/95 p-8 rounded-2xl shadow-xl border border-border/50 mb-12 backdrop-blur-sm"></div>

        <!-- Action Buttons -->
        <div class="text-center">
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center mb-8">
                <a href="orders.html" class="inline-flex items-center gap-3 px-8 py-4 bg-primary text-primary-foreground rounded-xl hover:bg-primary/90 transition-all duration-200 font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                    <i data-lucide="list" class="w-5 h-5"></i>
                    View All Orders
                </a>
                <a href="index.html" class="inline-flex items-center gap-3 px-8 py-4 bg-secondary text-secondary-foreground rounded-xl hover:bg-secondary/80 transition-all duration-200 font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    Continue Shopping
                </a>
            </div>
            <div class="flex justify-center items-center gap-8 text-sm text-muted-foreground">
                <div class="flex items-center gap-2">
                    <i data-lucide="truck" class="w-4 h-4 text-primary"></i>
                    <span>Free delivery</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="shield" class="w-4 h-4 text-primary"></i>
                    <span>Secure payment</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="headphones" class="w-4 h-4 text-primary"></i>
                    <span>24/7 support</span>
                </div>
            </div>
        </div>
    </main>
    <div data-include="components/footer.html"></div>
    <script src="js/includes.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/toast.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
