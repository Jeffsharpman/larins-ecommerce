<header class="fixed top-0 left-0 w-full z-40 backdrop-blur-md bg-gradient-to-b from-card to-transparent border-b border-border" role="banner">
    <div class="flex items-center justify-between h-16 px-4 max-w-7xl mx-auto">

        <!-- Mobile menu button -->
        <button class="lg:hidden flex items-center justify-center p-2 -ml-2 bg-transparent border-none cursor-pointer text-muted-foreground" aria-label="Toggle menu" id="menuToggle">
            <i data-lucide="menu" class="w-5 h-5 menu-icon"></i>
            <i data-lucide="x" class="w-5 h-5 close-icon hidden"></i>
        </button>

        <!-- Logo -->
        <a href="index.html" class="text-center">
            <h1 class="font-serif text-lg font-bold text-foreground tracking-wider">Larins</h1>
        </a>

        <!-- Desktop nav -->
        <nav class="hidden lg:flex items-center gap-8" role="navigation" aria-label="Main navigation">
            <a href="index.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">Home</a>
            <a href="products.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">Shop</a>
            <a href="brands.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">Brands</a>
            <a href="categories.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">Categories</a>
            <a href="about.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">About</a>
            <a href="faq.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">FAQ</a>
            <a href="reviews.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">Reviews</a>
            <a href="contact.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">Contact</a>
            <a href="orders.html" class="text-sm font-medium text-foreground hover:text-primary transition-colors">Orders</a>
        </nav>

        <!-- Desktop search -->
        <div class="hidden lg:flex relative w-64" role="search">
            <div class="relative w-full">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground"></i>
                <input type="search" placeholder="Search products..." class="w-full py-2.5 px-3 pl-10 bg-muted border border-border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary" aria-label="Search products" />
            </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-1">
            <button class="lg:hidden relative p-2 bg-transparent border-none text-muted-foreground cursor-pointer hover:text-foreground" aria-label="Open search" id="searchToggle">
                <i data-lucide="search" class="w-5 h-5"></i>
            </button>
            <a href="wishlist.html" class="hidden md:flex relative p-2 bg-transparent border-none text-muted-foreground cursor-pointer hover:text-foreground" aria-label="Wishlist">
                <i data-lucide="heart" class="w-5 h-5"></i>
            </a>
            <a href="cart.html" class="hidden md:flex relative p-2 bg-transparent border-none text-muted-foreground cursor-pointer hover:text-foreground" aria-label="Shopping cart">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                <span class="absolute top-1 right-1 h-4 min-w-4 px-1 rounded-full bg-primary text-primary-foreground text-xs font-medium flex items-center justify-center cart-count" aria-live="polite">0</span>
            </a>
            <a href="account.html" class="hidden md:flex relative p-2 bg-transparent border-none text-muted-foreground cursor-pointer hover:text-foreground" aria-label="Account">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </div>

    <!-- Mobile search panel -->
    <div class="hidden overflow-hidden max-h-0 border-t border-transparent transition-all duration-300" id="mobileSearch">
        <div class="px-4 py-3 max-w-7xl mx-auto">
            <div class="relative w-full">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground"></i>
                <input type="search" placeholder="Search products..." class="w-full py-2.5 px-3 pl-10 bg-muted border border-border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary" aria-label="Search products" />
            </div>
        </div>
    </div>

    <!-- Mobile menu panel -->
    <div class="hidden overflow-hidden max-h-0 border-t border-border transition-all duration-300 bg-card" id="mobileMenu">
        <nav class="flex flex-col p-4" role="navigation" aria-label="Mobile menu">
            <a href="index.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">Home</a>
            <a href="products.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">Shop</a>
            <a href="brands.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">Brands</a>
            <a href="categories.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">Categories</a>
            <a href="about.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">About</a>
            <a href="faq.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">FAQ</a>
            <a href="reviews.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">Reviews</a>
            <a href="contact.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">Contact</a>
            <a href="orders.html" class="py-3 text-sm font-medium text-foreground border-b border-muted">Orders</a>
            <div class="flex gap-6 pt-4">
                <a href="wishlist.html" class="flex items-center gap-2 text-foreground text-sm">
                    <i data-lucide="heart" class="w-4 h-4"></i> Wishlist
                </a>
                <a href="account.html" class="flex items-center gap-2 text-foreground text-sm">
                    <i data-lucide="user" class="w-4 h-4"></i> Account
                </a>
            </div>
        </nav>
    </div>
</header>
