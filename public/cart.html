<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Larins • Shopping Cart</title>
    <link rel="stylesheet" href="css/output.css" />
    <!-- Lucide icons (optional – remove if you prefer pure SVG) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>

    <!-- Header -->
    <div data-include="components/header.html"></div>

    <main id="main-content" class="py-8" tabindex="-1">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-4xl font-bold mb-8">Shopping Cart</h1>

            <!-- Empty Cart State -->
            <div class="hidden" id="emptyCart">
                <div class="text-center py-16">
                    <div class="mb-6 flex justify-center">
                        <i data-lucide="shopping-bag" class="w-16 h-16 text-muted-foreground"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">Your cart is empty</h2>
                    <p class="text-muted-foreground mb-6">Looks like you haven't added anything yet.</p>
                    <a href="index.html" class="inline-block px-8 py-3 bg-primary text-primary-foreground font-semibold rounded-lg hover:bg-gold-dark transition-colors">Start Shopping</a>
                </div>
            </div>

            <!-- Cart with items -->
            <div class="hidden" id="cartWithItems">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <div class="space-y-4 cart-items-column">
                            <!-- Cart items will be inserted here by JS -->
                        </div>
                    </div>

                    <!-- Order Summary (sticky on large screens) -->
                    <aside class="lg:sticky lg:top-4">
                        <div class="bg-card rounded-xl shadow-soft p-6 border border-border">
                            <h3 class="text-xl font-bold mb-6">Order Summary</h3>

                            <!-- Promo -->
                            <div class="mb-6">
                                <div class="flex gap-2 mb-4">
                                    <input type="text" id="promoCode" placeholder="Promo code" class="flex-1 px-4 py-2 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" />
                                    <button id="applyPromoBtn" class="px-4 py-2 border border-border text-foreground rounded-lg hover:bg-muted transition-colors font-medium">Apply</button>
                                </div>
                                <p id="promoMessage" class="hidden text-sm text-green-600">✓ 15% discount applied!</p>
                            </div>

                            <!-- Totals -->
                            <div class="space-y-3 mb-6">
                                <div class="flex justify-between text-sm">
                                    <span class="text-muted-foreground">Subtotal</span>
                                    <span id="subtotal">$0.00</span>
                                </div>
                                <div class="flex justify-between text-sm hidden" id="discountLine">
                                    <span class="text-muted-foreground">Discount (15%)</span>
                                    <span id="discountAmount" class="text-red-600">-$0.00</span>
                                </div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-muted-foreground">Shipping</span>
                                    <span id="shipping">Free</span>
                                </div>
                                <p id="freeShippingHint" class="hidden text-xs text-muted-foreground">
                                    Add $<span id="toFreeShipping">50.00</span> more for free shipping
                                </p>
                                <div class="pt-3 border-t border-gray-200 flex justify-between font-bold">
                                    <span>Total</span>
                                    <span id="total">$0.00</span>
                                </div>
                            </div>

                            <button class="w-full px-6 py-3 bg-gold text-foreground font-semibold rounded-lg hover:bg-gold-dark transition-colors flex items-center justify-center gap-2 checkout-btn">
                                Proceed to Checkout
                                <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>

                            <p class="text-xs text-center text-muted-foreground mt-4">Secure checkout powered by Stripe</p>
                        </div>
                    </aside>
                </div>
            </div>
        </div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="js/includes.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/header-auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/orders.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>


</html>
