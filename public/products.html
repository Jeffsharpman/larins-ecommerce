<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Products · Larins</title>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div data-include="components/header.html"></div>
    <main id="main-content" class="py-8" tabindex="-1">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-4xl font-bold mb-8">All Products</h1>
            <div class="space-y-8">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <p class="text-sm text-muted-foreground"><span id="productCount">0</span> products</p>
                    <div class="flex gap-4 w-full md:w-auto">
                        <input type="search" id="globalSearch" placeholder="Search products..." class="flex-1 md:flex-none px-4 py-2 border border-border rounded-lg bg-card focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" aria-label="Search products" />
                        <select id="sortSelect" class="px-4 py-2 border border-border rounded-lg bg-card focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
                            <option value="featured">Featured</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="rating">Highest Rated</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="productsGrid"></div>
            </div>
        </div>
    </main>
    <div data-include="components/footer.html"></div>
    <script src="js/includes.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/header-auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
