<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Larins • Order Details</title>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div data-include="components/header.html"></div>
    <main id="main-content" class="max-w-7xl mx-auto px-4 py-16" tabindex="-1">
        <!-- Navigation -->
        <nav class="mb-8">
            <a href="orders.html" class="inline-flex items-center gap-2 text-muted-foreground hover:text-foreground transition-colors px-4 py-2 rounded-lg hover:bg-muted/50">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span class="font-medium">Back to orders</span>
            </a>
        </nav>

        <!-- Order Details Container -->
        <div id="orderDetailsContainer" class="bg-gradient-to-br from-card to-card/95 p-8 rounded-2xl shadow-xl border border-border/50 backdrop-blur-sm">
            <!-- order details will be filled by JS -->
        </div>

        <!-- Help Section -->
        <div class="mt-12 bg-muted/30 rounded-xl p-6">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center flex-shrink-0">
                    <i data-lucide="help-circle" class="w-5 h-5 text-primary"></i>
                </div>
                <div>
                    <h3 class="font-semibold mb-2">Need help with your order?</h3>
                    <p class="text-sm text-muted-foreground mb-4">Our customer service team is here to assist you with any questions about your order.</p>
                    <div class="flex flex-wrap gap-3">
                        <a href="contact.html" class="inline-flex items-center gap-2 px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium">
                            <i data-lucide="message-circle" class="w-4 h-4"></i>
                            Contact Support
                        </a>
                        <a href="contact.html" class="inline-flex items-center gap-2 px-4 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors text-sm font-medium">
                            <i data-lucide="phone" class="w-4 h-4"></i>
                            Call Us
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div data-include="components/footer.html"></div>
    <script src="js/includes.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/toast.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
