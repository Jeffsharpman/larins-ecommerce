<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larins • Orders</title>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div data-include="components/header.html"></div>
    <main id="main-content" class="max-w-7xl mx-auto px-4 py-16" tabindex="-1">
        <!-- Header Section -->
        <div class="mb-12">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center">
                    <i data-lucide="package" class="w-6 h-6 text-primary"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-bold">Your Orders</h1>
                    <p class="text-muted-foreground mt-1">Track and manage all your orders in one place</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-6 text-sm text-muted-foreground">
                <div class="flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    <span>Real-time updates</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="truck" class="w-4 h-4"></i>
                    <span>Delivery tracking</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    <span>Easy returns</span>
                </div>
            </div>
        </div>

        <!-- Orders Grid -->
        <div id="ordersContainer" class="grid gap-6 md:grid-cols-1 lg:grid-cols-1">
            <!-- orders will be filled by JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyOrdersMessage" class="text-center py-20 hidden">
            <div class="relative mb-8">
                <div class="w-24 h-24 bg-muted/50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="package" class="w-12 h-12 text-muted-foreground"></i>
                </div>
                <!-- Decorative elements -->
                <div class="absolute top-2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                    <div class="w-2 h-2 bg-primary/20 rounded-full"></div>
                </div>
                <div class="absolute bottom-2 right-1/4">
                    <div class="w-1 h-1 bg-secondary/20 rounded-full"></div>
                </div>
            </div>
            <h3 class="text-2xl font-semibold mb-3">No orders yet</h3>
            <p class="text-muted-foreground mb-8 max-w-md mx-auto">You haven't placed any orders yet. Start exploring our beautiful collection and find something you'll love!</p>
            <a href="index.html" class="inline-flex items-center gap-3 px-8 py-4 bg-primary text-primary-foreground rounded-xl hover:bg-primary/90 transition-all duration-200 font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                Start Shopping
            </a>
        </div>
    </main>
    <div data-include="components/footer.html"></div>

    <script src="js/includes.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/toast.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
