<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Larins • Checkout</title>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <!-- Header include -->
    <div data-include="components/header.html"></div>

    <main id="main-content" class="max-w-7xl mx-auto px-4 py-16" tabindex="-1">
        <h1 class="text-4xl font-bold mb-8">Checkout</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Checkout Form -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Shipping Information -->
                <section class="bg-card rounded-xl shadow-soft p-6 border border-border">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="truck" class="w-6 h-6 text-primary"></i>
                        Shipping Information
                    </h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="firstName" class="block text-sm font-medium mb-2 text-foreground">First Name</label>
                            <input type="text" id="firstName" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                        </div>
                        <div>
                            <label for="lastName" class="block text-sm font-medium mb-2 text-foreground">Last Name</label>
                            <input type="text" id="lastName" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                        </div>
                        <div class="md:col-span-2">
                            <label for="email" class="block text-sm font-medium mb-2 text-foreground">Email Address</label>
                            <input type="email" id="email" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                        </div>
                        <div class="md:col-span-2">
                            <label for="address" class="block text-sm font-medium mb-2 text-foreground">Street Address</label>
                            <input type="text" id="address" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                        </div>
                        <div>
                            <label for="city" class="block text-sm font-medium mb-2 text-foreground">City</label>
                            <input type="text" id="city" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                        </div>
                        <div>
                            <label for="zipCode" class="block text-sm font-medium mb-2 text-foreground">ZIP Code</label>
                            <input type="text" id="zipCode" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                        </div>
                    </div>
                </section>

                <!-- Payment Information -->
                <section class="bg-card rounded-xl shadow-soft p-6 border border-border">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="credit-card" class="w-6 h-6 text-primary"></i>
                        Payment Information
                    </h2>

                    <div class="space-y-4">
                        <div>
                            <label for="cardNumber" class="block text-sm font-medium mb-2 text-foreground">Card Number</label>
                            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="expiryDate" class="block text-sm font-medium mb-2 text-foreground">Expiry Date</label>
                                <input type="text" id="expiryDate" placeholder="MM/YY" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                            </div>
                            <div>
                                <label for="cvv" class="block text-sm font-medium mb-2 text-foreground">CVV</label>
                                <input type="text" id="cvv" placeholder="123" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                            </div>
                        </div>
                        <div>
                            <label for="cardName" class="block text-sm font-medium mb-2 text-foreground">Name on Card</label>
                            <input type="text" id="cardName" class="w-full px-4 py-3 border border-border rounded-lg bg-background focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
                        </div>
                    </div>

                    <div class="mt-6 p-4 bg-muted/50 rounded-lg border border-border">
                        <div class="flex items-center gap-3 text-sm text-muted-foreground">
                            <i data-lucide="shield-check" class="w-5 h-5 text-green-500"></i>
                            <span>Your payment information is secure and encrypted</span>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Order Summary Sidebar -->
            <aside class="lg:sticky lg:top-4">
                <section id="checkoutSummary" class="bg-card rounded-xl shadow-soft p-6 border border-border">
                    <!-- Order summary content will be inserted here by JS -->
                </section>
            </aside>
        </div>
    </main>

    <!-- Footer include -->
    <div data-include="components/footer.html"></div>

    <script src="js/includes.js"></script>
    <script src="js/checkout.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/toast.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
