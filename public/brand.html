<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Larins • Brand</title>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div data-include="components/header.html"></div>
    <main id="main-content" tabindex="-1">
        <!-- Brand Hero/Info -->
        <div class="bg-gradient-to-br from-blush via-muted to-sage py-12 md:py-16 text-center">
            <div class="max-w-7xl mx-auto px-4">
                <h1 id="brandTitle" class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">Brand Name</h1>
                <p id="brandDesc" class="text-muted-foreground text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">Short description about the brand goes here.</p>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1">
                    <!-- Toolbar similar to category page -->
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <p class="text-muted-foreground"><span id="productCount">0</span> products</p>
                        <div class="flex items-center gap-4">
                            <button id="openFilters" class="lg:hidden flex items-center gap-2 px-4 py-2 border border-border rounded-lg bg-card hover:bg-muted transition-colors">
                                <i data-lucide="sliders-horizontal"></i> Filters
                            </button>
                            <select id="sortSelect" class="px-4 py-2 border border-border rounded-lg bg-card focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
                                <option value="featured">Featured</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="rating">Highest Rated</option>
                            </select>
                        </div>
                    </div>

                    <!-- Products Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="productsGrid">
                        <!-- Dynamically filled by JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div data-include="components/footer.html"></div>

    <script src="js/includes.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/header-auth.js"></script>
    <script src="js/products.js"></script>
    <script src="js/brands.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
